services:
  redis:
    image: redis:7-alpine
    container_name: interview_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    # We remove container_name to allow multiple instances to scale
    # container_name: interview_backend
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=production  # ensures Celery task_always_eager=False (truly async)
      - TRUST_PROXY_HEADERS=true
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: 3

  celery_worker:
    build:
      context: ./backend
    container_name: interview_celery_worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info -Q celery,ai,email,reports
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=production  # ensures Celery task_always_eager=False (truly async)
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    volumes:
      - uploads_data:/app/uploads

  celery_beat:
    build:
      context: ./backend
    command: celery -A app.celery_app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    container_name: interview_nginx
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./Front-end
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: interview_frontend
    ports:
      - "80:80"
    depends_on:
      - nginx
    restart: always

volumes:
  uploads_data:
