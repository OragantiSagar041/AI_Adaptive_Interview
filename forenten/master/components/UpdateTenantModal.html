<div class="master-modal hidden" id="updateTenantModal">
<div class="master-modal-card">
<div class="master-modal-head">
<div>
<h3>Update Tenant Subscription</h3>
<p>Change the plan or add extra days to the current expiry.</p>
</div>
<button class="master-close" onclick="document.getElementById('updateTenantModal').classList.add('hidden')"><i class="fas fa-times"></i></button>
</div>
<div class="master-modal-body">
<input id="updateTenantId" type="hidden"/>
<div class="master-field">
<label>Subscription Plan</label>
<select class="dash-input" id="updateTenantPlan">
<option value="trial">15 Days Free Trial</option>
<option value="basic">Basic</option>
<option value="advance">Advance</option>
</select>
</div>
<div class="master-field">
<label>Extend Expiry (Days)</label>
<input class="dash-input" id="updateTenantDays" min="0" placeholder="Add days to subscription" type="number" value="0"/>
<small style="color: var(--text-muted); margin-top: 0.25rem; display: block;">Leave as 0
                                    to keep current expiry.</small>
</div>
</div>
<div class="master-modal-actions">
<button class="master-btn" onclick="document.getElementById('updateTenantModal').classList.add('hidden')">Cancel</button>
<button class="master-btn primary" onclick="submitUpdateTenant()"><i class="fas fa-calendar-plus"></i> Update Plan</button>
</div>
</div>
</div>
