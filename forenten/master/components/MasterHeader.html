<div class="top-bar">
<div class="brand-text">
<h2 id="consoleTitle">Super Admin Console</h2>
</div>
<div class="topbar-actions">
<!-- Color Switcher -->
<div class="color-switcher" title="Change accent color">
<div class="color-dot" id="dot-teal" onclick="setAccent('teal')" style="background:#0d9488" title="Teal"></div>
<div class="color-dot" id="dot-indigo" onclick="setAccent('indigo')" style="background:#6366f1" title="Indigo"></div>
<div class="color-dot" id="dot-purple" onclick="setAccent('purple')" style="background:#9333ea" title="Purple"></div>
<div class="color-dot" id="dot-red" onclick="setAccent('red')" style="background:#e11d48" title="Red"></div>
<div class="color-dot" id="dot-green" onclick="setAccent('green')" style="background:#16a34a" title="Green"></div>
<div class="color-dot" id="dot-blue" onclick="setAccent('blue')" style="background:#2563eb" title="Blue"></div>
</div>
<div id="subscriptionPlanBadge" style="display:none; align-items:center; gap:8px; background:rgba(13,148,136,0.12); color:#4f46e5; border:1px solid rgba(13,148,136,0.24); border-radius:999px; padding:8px 12px; font-size:0.8rem; font-weight:700; white-space:nowrap;">
</div>
<span class="welcome-copy">Welcome back, <strong id="adminName">Admin</strong></span>
<div class="notification-btn" onclick="toggleNotificationDropdown(event)" style="position:relative; cursor:pointer; font-size:1.2rem; color:var(--text-muted); margin-right:1rem;; position:relative;">
<i class="fas fa-bell"></i>
<span style="position:absolute; top:-2px; right:-2px; width:8px; height:8px; background:var(--danger); border-radius:50%;"></span>
<div class="notification-dropdown" id="notificationDropdown">
<h4 style="margin:0 0 10px 0; font-size:0.9rem; color:var(--text-primary);">Notifications</h4>
<div style="font-size:0.8rem; color:var(--text-muted); padding:0.5rem 0; border-bottom:1px solid var(--border);">No new notifications</div>
</div>
</div>
<div class="profile-dropdown-container" onclick="toggleProfileDropdown(event)" style="position:relative; display:flex; align-items:center; gap:10px; cursor:pointer;; position: relative;">
<img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" style="width:36px; height:36px; border-radius:50%;"/>
<div style="line-height:1.2;">
<div style="font-size:0.9rem; font-weight:600; color:var(--text-primary);">Sarah J.</div>
<div style="font-size:0.75rem; color:var(--text-muted);">Admin</div>
</div>
<i class="fas fa-chevron-down" style="font-size:0.8rem; color:var(--text-muted);"></i>
<div class="dropdown-menu hidden" style="position:absolute; top:100%; right:0; background:var(--bg-card); border:1px solid var(--border); box-shadow:var(--shadow-md); border-radius:var(--radius-md); width:180px; z-index:9999; margin-top:10px; padding:0.5rem 0;">
<a href="#" onclick="event.preventDefault();" style="display:flex; align-items:center; gap:10px; padding:0.6rem 1rem; color:var(--text-primary); text-decoration:none; font-size:0.9rem;"><i class="fas fa-user"></i> My Profile</a>
<a href="#" onclick="event.preventDefault();" style="display:flex; align-items:center; gap:10px; padding:0.6rem 1rem; color:var(--text-primary); text-decoration:none; font-size:0.9rem;"><i class="fas fa-cog"></i> Settings</a>
<hr style="border:none; border-top:1px solid var(--border); margin:0.5rem 0;"/>
<a href="#" onclick="event.preventDefault(); performLogout();" style="display:flex; align-items:center; gap:10px; padding:0.6rem 1rem; color:var(--danger); text-decoration:none; font-size:0.9rem;"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
</div>
</div>
</div>
