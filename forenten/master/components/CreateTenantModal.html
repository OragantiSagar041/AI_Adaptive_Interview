<div class="master-modal hidden" id="createTenantModal">
<div class="master-modal-card">
<div class="master-modal-head">
<div>
<h3>Create New Tenant</h3>
<p>Create an admin account and assign its starting subscription plan.</p>
</div>
<button class="master-close" onclick="closeCreateTenantModal()"><i class="fas fa-times"></i></button>
</div>
<div class="master-modal-body">
<div class="master-form-grid">
<div class="master-field">
<label>Company Name</label>
<input class="dash-input" id="tenantCompanyModal" placeholder="Company Inc." type="text"/>
</div>
<div class="master-field">
<label>Username</label>
<input class="dash-input" id="tenantUsername" placeholder="company_admin" type="text"/>
</div>
<div class="master-field">
<label>Email</label>
<input class="dash-input" id="tenantEmail" placeholder="admin@company.com" type="email"/>
</div>
</div>
<div class="master-form-grid">
<div class="master-field">
<label>Password</label>
<div style="position: relative;">
<input class="dash-input" id="tenantPassword" placeholder="Password" style="padding-right: 40px; width: 100%;" type="password"/>
<button onclick="togglePasswordVisibility('tenantPassword')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer;"><i class="fas fa-eye"></i></button>
</div>
</div>
<div class="master-field">
<label>Subscription Plan</label>
<select class="dash-input" id="tenantPlan">
<option value="trial">15 Days Free Trial</option>
<option value="basic">Basic</option>
<option value="advance">Advance</option>
</select>
</div>
</div>
</div>
<div class="master-modal-actions">
<button class="master-btn" onclick="closeCreateTenantModal()">Cancel</button>
<button class="master-btn primary" onclick="submitCreateTenant()"><i class="fas fa-user-plus"></i> Create Tenant</button>
</div>
</div>
</div>
